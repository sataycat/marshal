<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marshal</title>
    <script>
      (() => {
        const stored = localStorage.getItem("marshal-theme");
        const mode = stored === "dracula" || stored === "alucard" ? stored : "system";
        const theme = mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dracula" : mode === "system" ? "alucard" : mode;
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle("dark", theme === "dracula");
        document.documentElement.style.colorScheme = theme === "dracula" ? "dark" : "light";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
